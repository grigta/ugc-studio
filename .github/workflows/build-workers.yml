name: build-workers

# Собирает и пушит 3 образа воркеров в GitHub Container Registry (ghcr.io).
# Локальный Docker не нужен — всё на раннере GitHub (нативно linux/amd64).
# Авторизация в ghcr.io — встроенным GITHUB_TOKEN, секреты не требуются.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Тег образов (напр. 1.0)"
        default: "1.0"
  push:
    branches: [main]
    paths:
      - "workers/**"
      - ".github/workflows/build-workers.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        worker: [image, video, voice]
    steps:
      - uses: actions/checkout@v4

      # образы тяжёлые (worker-comfyui ~13GB, CUDA+torch) — освобождаем место на раннере
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Lowercase owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.worker }}
        uses: docker/build-push-action@v6
        with:
          context: workers/${{ matrix.worker }}
          file: workers/${{ matrix.worker }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/ugc-${{ matrix.worker }}-worker:${{ github.event.inputs.tag || 'latest' }}
            ghcr.io/${{ steps.vars.outputs.owner }}/ugc-${{ matrix.worker }}-worker:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.worker }}
          cache-to: type=gha,mode=max,scope=${{ matrix.worker }}

      - name: Summary
        run: |
          echo "### Образ собран: ugc-${{ matrix.worker }}-worker" >> "$GITHUB_STEP_SUMMARY"
          echo "\`ghcr.io/${{ steps.vars.outputs.owner }}/ugc-${{ matrix.worker }}-worker:${{ github.event.inputs.tag || 'latest' }}\`" >> "$GITHUB_STEP_SUMMARY"
